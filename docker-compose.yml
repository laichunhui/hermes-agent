#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) KRIKI_SERVER_KEY=<your-key> docker compose up -d
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `hermes` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#   - Kriki server listens on 0.0.0.0:4088. KRIKI_SERVER_KEY is mandatory
#     when binding to a network-accessible address.
#
services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}

      # -----------------------------------------------------------------
      # Kriki Server — OpenAI Responses-compatible API (POST /v1/kriki/responses)
      # KRIKI_SERVER_KEY is required; must be at least 8 chars.
      # -----------------------------------------------------------------
      - KRIKI_SERVER_KEY=${KRIKI_SERVER_KEY}
      - KRIKI_SERVER_HOST=0.0.0.0
      - KRIKI_SERVER_PORT=${KRIKI_SERVER_PORT:-4088}
      # Model name returned in responses (cosmetic, does not select the LLM):
      - KRIKI_SERVER_MODEL_NAME=${KRIKI_SERVER_MODEL_NAME:-kriki-agent}
      # Per-session agent cache: max sessions kept in memory and idle TTL (seconds):
      - KRIKI_AGENT_CACHE_MAX_SIZE=${KRIKI_AGENT_CACHE_MAX_SIZE:-128}
      - KRIKI_AGENT_CACHE_IDLE_TTL=${KRIKI_AGENT_CACHE_IDLE_TTL:-3600}
      # Optional CORS origins (comma-separated), e.g. "https://app.example.com":
      # - KRIKI_SERVER_CORS_ORIGINS=${KRIKI_SERVER_CORS_ORIGINS}
    command: ["gateway", "run"]

  dashboard:
    build: .
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    # Localhost-only. For remote access, tunnel via `ssh -L 9119:localhost:9119`.
    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]
